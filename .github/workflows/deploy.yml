name: Deploy Fintrix (Hostinger VPS)

# Dispara no push para a main (ou manualmente em Actions → Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita dois deploys rodando ao mesmo tempo.
concurrency:
  group: deploy-fintrix
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOSTINGER_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Escreve a chave garantindo LF e newline final (evita corrupção por CRLF do Windows).
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat > ~/.ssh/config <<EOF
          Host deploy
            HostName $SSH_HOST
            User $SSH_USER
            Port ${SSH_PORT:-22}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            BatchMode yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Testar conexão SSH
        run: ssh deploy 'echo "Conectado como $(whoami) em $(hostname)"'

      - name: Enviar arquivos para o servidor (rsync)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='Exemplos' \
            -e ssh ./ "deploy:${DEPLOY_PATH}/"

      - name: Build e subir containers
        run: |
          ssh deploy "cd '${DEPLOY_PATH}' && docker compose up -d --build --remove-orphans && docker image prune -f"
